name: scanlog
description: "ScanLog — On-Device ML Text Recognition — COMP 6910 Assignment 6 — Jahidul Arafat"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # On-device ML — text recognition (iOS real device + Android)
  # Run with: flutter run -d <iphone-device-id>
  google_mlkit_text_recognition: ^0.13.1

  # Image picker — photo library + camera
  image_picker: ^1.1.2

  # Local persistence
  shared_preferences: ^2.2.3

  # State management
  provider: ^6.1.5

  # UUID for entry IDs
  uuid: ^4.5.1

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
